name: Publish reference image to ghcr.io

# Build and publish reference-image/ to ghcr.io/<owner>/netcore-lldb when a
# version tag is pushed (e.g. `git tag v0.3.0 && git push origin v0.3.0`).
# Also runnable on demand from the Actions tab.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Explicit image tag (e.g. 'v0.3.1' or 'edge'). Defaults to the git tag."
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="edge"
          fi
          IMAGE="ghcr.io/${{ github.repository_owner }}/netcore-lldb"
          {
            echo "version=$VERSION"
            echo "image=$IMAGE"
            echo "tags<<EOF"
            echo "$IMAGE:$VERSION"
            if [ "${VERSION#v}" != "$VERSION" ]; then
              echo "$IMAGE:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./reference-image
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=netcore-lldb reference image
            org.opencontainers.image.description=Pre-installed lldb + SOS + .NET 8/10 runtime for analyzing .NET Linux dumps
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Summary
        run: |
          {
            echo "## Pushed to ghcr.io"
            echo ""
            echo "\`\`\`"
            echo "${{ steps.meta.outputs.tags }}"
            echo "\`\`\`"
            echo ""
            echo "Pull with:"
            echo ""
            echo "\`\`\`bash"
            echo "docker pull ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
